<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FramePicker">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>🎬 Frame Picker</title>
<script src="jszip.min.js"></script>
<style>
  :root{
    --bg:#0d1117; --card:#161b22; --card2:#1c2330; --border:#2d3644;
    --text:#e6edf3; --muted:#8b949e; --accent:#3fb950; --accent2:#2ea043;
    --blue:#388bfd; --danger:#f85149; --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{overscroll-behavior-y:none;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding-bottom:calc(150px + env(safe-area-inset-bottom));
    padding-top:env(safe-area-inset-top);
  }
  header{padding:14px 16px 4px; text-align:center;}
  header h1{margin:0; font-size:1.25rem;}
  header p{margin:5px 0 0; color:var(--muted); font-size:.82rem;}
  .wrap{max-width:1100px; margin:0 auto; padding:12px 14px;}

  #dropzone{
    border:2px dashed var(--border); border-radius:var(--radius);
    padding:44px 20px; text-align:center; cursor:pointer;
    transition:.2s; background:var(--card);
  }
  #dropzone.drag{border-color:var(--accent); background:#12261a;}
  #dropzone .big{font-size:2.6rem;}
  #dropzone p{color:var(--muted); margin:8px 0 0; font-size:.9rem;}
  #fileInput{display:none;}

  .panel{
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:14px; margin-top:14px;
  }
  .panel h3{margin:0 0 10px; font-size:.95rem; color:var(--muted); font-weight:600;}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .field{display:flex; flex-direction:column; gap:5px; flex:1; min-width:120px;}
  .field label{font-size:.78rem; color:var(--muted);}
  select,input[type=number]{
    background:var(--card2); color:var(--text); border:1px solid var(--border);
    border-radius:10px; padding:10px 12px; font-size:1rem; width:100%;
  }
  .btn{
    border:none; border-radius:12px; padding:12px 18px; font-size:1rem;
    font-weight:600; cursor:pointer; transition:.15s;
    display:inline-flex; align-items:center; gap:8px; justify-content:center;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--accent2); color:#fff;}
  .btn-blue{background:var(--blue); color:#fff;}
  .btn-ghost{background:var(--card2); color:var(--text); border:1px solid var(--border);}
  .btn-danger{background:transparent; color:var(--danger); border:1px solid var(--danger);}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .btn-sm{padding:8px 12px; font-size:.85rem;}

  #videoBox{display:none;}
  video{width:100%; max-height:300px; border-radius:var(--radius); background:#000; display:block;}
  #videoMeta{color:var(--muted); font-size:.82rem; margin-top:8px;}

  #progressWrap{display:none; margin-top:12px;}
  #progressBar{height:10px; background:var(--card2); border-radius:99px; overflow:hidden;}
  #progressFill{height:100%; width:0%; background:linear-gradient(90deg,var(--blue),var(--accent)); transition:width .15s; border-radius:99px;}
  #progressText{font-size:.8rem; color:var(--muted); margin-top:6px; text-align:center;}

  /* ===== Album browser (mobile) ===== */
  #framesPanel{display:none;}
  .frames-tools{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; align-items:center;}
  .frames-tools .spacer{flex:1;}

  #album{position:relative; border-radius:12px; overflow:hidden; background:#000;}
  #slider{
    display:flex; overflow-x:auto; scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch; aspect-ratio:16/11;
    scrollbar-width:none;
  }
  #slider::-webkit-scrollbar{display:none;}
  .slide{
    flex:0 0 100%; scroll-snap-align:center; display:flex;
    align-items:center; justify-content:center;
  }
  .slide img{max-width:100%; max-height:100%; object-fit:contain;}
  .ov{position:absolute; z-index:5;}
  .badge{
    background:rgba(0,0,0,.65); padding:4px 9px; border-radius:8px;
    font-size:.75rem; pointer-events:none;
  }
  #selBtn{
    left:10px; top:10px; width:38px; height:38px; border-radius:50%;
    border:2px solid rgba(255,255,255,.85); background:rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center;
    color:transparent; font-size:1.1rem; cursor:pointer;
  }
  #selBtn.on{background:var(--accent); border-color:var(--accent); color:#fff;}
  #posBadge{right:10px; top:14px;}
  #timeBadge{left:10px; bottom:12px;}
  #zoomHint{right:10px; bottom:12px;}

  #thumbs{
    display:flex; gap:6px; overflow-x:auto; margin-top:10px;
    -webkit-overflow-scrolling:touch; padding-bottom:4px;
    scrollbar-width:none;
  }
  #thumbs::-webkit-scrollbar{display:none;}
  .thumb{
    flex:0 0 56px; height:56px; border-radius:8px; overflow:hidden;
    border:2px solid transparent; position:relative; cursor:pointer;
  }
  .thumb img{width:100%; height:100%; object-fit:cover; pointer-events:none;}
  .thumb.cur{border-color:#fff;}
  .thumb.sel{border-color:var(--accent);}
  .thumb.sel.cur{border-color:#fff;}
  .thumb.sel::after{
    content:"✓"; position:absolute; right:2px; bottom:2px;
    background:var(--accent); color:#fff; border-radius:50%;
    width:15px; height:15px; font-size:.65rem;
    display:flex; align-items:center; justify-content:center;
  }

  /* ===== Grid (desktop) ===== */
  #grid{display:grid; gap:10px; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  .cell{
    position:relative; border-radius:12px; overflow:hidden; cursor:pointer;
    border:3px solid transparent; transition:border-color .15s;
    background:var(--card2); aspect-ratio:16/10;
  }
  .cell img{width:100%; height:100%; object-fit:cover; display:block; pointer-events:none;}
  .cell .time{position:absolute; left:6px; bottom:6px; background:rgba(0,0,0,.65); padding:2px 7px; border-radius:7px; font-size:.7rem;}
  .cell .check{
    position:absolute; left:6px; top:6px; width:26px; height:26px;
    border-radius:50%; border:2px solid rgba(255,255,255,.8);
    background:rgba(0,0,0,.35); display:flex; align-items:center;
    justify-content:center; font-size:.85rem; color:transparent; transition:.15s;
  }
  .cell.sel{border-color:var(--accent);}
  .cell.sel .check{background:var(--accent); border-color:var(--accent); color:#fff;}

  #actionBar{
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    background:rgba(13,17,23,.92); backdrop-filter:blur(14px);
    border-top:1px solid var(--border);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    display:none;
  }
  #actionBar .inner{max-width:1100px; margin:0 auto; display:flex; gap:8px; align-items:center;}
  #selCount{font-weight:700; font-size:.9rem; white-space:nowrap;}
  #selCount b{color:var(--accent);}

  #lightbox{
    display:none; position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,.95); flex-direction:column;
  }
  #lbMain{flex:1; display:flex; align-items:center; justify-content:center; padding:10px; min-height:0; touch-action:none; overflow:hidden;}
  #lbMain img{max-width:100%; max-height:100%; object-fit:contain; border-radius:6px; will-change:transform;}
  #lbThumbsWrap{position:relative; padding:8px 0 4px;}
  #lbThumbs{
    display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none; padding:0 calc(50vw - 31px);
    scroll-snap-type:x proximity;
  }
  #lbThumbs::-webkit-scrollbar{display:none;}
  .lb-thumb{
    flex:0 0 56px; height:56px; border-radius:8px; overflow:hidden;
    border:2px solid transparent; scroll-snap-align:center; cursor:pointer;
  }
  .lb-thumb img{width:100%; height:100%; object-fit:cover; pointer-events:none;}
  .lb-thumb.sel{border-color:var(--accent);}
  .lb-thumb.cur{border-color:#fff;}
  #lbCenterMark{
    position:absolute; left:50%; transform:translateX(-50%); top:4px;
    width:66px; height:64px; border:2px solid rgba(255,255,255,.4);
    border-radius:11px; pointer-events:none;
  }
  #lbTop{
    display:flex; align-items:center; gap:10px;
    padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
  }
  #lbBottom{
    display:flex; gap:10px; padding:10px 14px calc(14px + env(safe-area-inset-bottom));
  }
  .toast{
    position:fixed; top:calc(16px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    background:var(--accent2); color:#fff; padding:10px 20px;
    border-radius:99px; font-size:.9rem; z-index:200; opacity:0;
    transition:opacity .25s; pointer-events:none; font-weight:600;
    max-width:86vw; text-align:center;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <h1>🎬 Frame Picker</h1>
  <p>Tách ảnh từ video → chọn ảnh bạn thích → lưu về máy</p>
</header>

<div class="wrap">
  <div id="dropzone">
    <div class="big">📹</div>
    <div style="font-weight:600; margin-top:6px;">Bấm để chọn video</div>
    <p>Xử lý ngay trên máy, không upload đi đâu cả.</p>
  </div>
  <input type="file" id="fileInput" accept="video/*">

  <div class="panel" id="videoBox">
    <video id="video" playsinline muted controls preload="auto"></video>
    <div id="videoMeta"></div>
    <div class="row" style="margin-top:10px;">
      <button class="btn btn-blue" style="flex:1;" id="btnCaptureNow">📸 Chụp khung hiện tại</button>
      <button class="btn btn-ghost" id="btnChangeVideo">🔄</button>
    </div>
  </div>

  <div class="panel" id="settings" style="display:none;">
    <h3>⚙️ Tách ảnh tự động</h3>
    <div class="row">
      <div class="field">
        <label>Cách tách</label>
        <select id="modeSel">
          <option value="count">Tổng số ảnh</option>
          <option value="interval">Mỗi X giây 1 ảnh</option>
        </select>
      </div>
      <div class="field">
        <label id="valLabel">Số ảnh</label>
        <input type="number" id="valInput" value="30" min="1" max="1000" inputmode="numeric">
      </div>
      <div class="field">
        <label>Định dạng</label>
        <select id="fmtSel">
          <option value="image/jpeg">JPG</option>
          <option value="image/png">PNG</option>
        </select>
      </div>
      <div class="field">
        <label>Độ phân giải</label>
        <select id="resSel">
          <option value="1280" selected>Nhanh (1280px)</option>
          <option value="0">Gốc (nét nhất, chậm)</option>
          <option value="854">Nhẹ (854px)</option>
        </select>
      </div>
    </div>
    <div class="row" style="margin-top:12px;">
      <button class="btn btn-primary" id="btnExtract" style="flex:1;">✂️ Bắt đầu tách ảnh</button>
    </div>
    <div id="progressWrap">
      <div id="progressBar"><div id="progressFill"></div></div>
      <div id="progressText"></div>
    </div>
  </div>

  <div class="panel" id="framesPanel">
    <div class="frames-tools">
      <h3 style="margin:0;">🖼️ <span id="totalCount">0</span> ảnh</h3>
      <div class="spacer"></div>
      <button class="btn btn-ghost btn-sm" id="btnSelAll">Chọn hết</button>
      <button class="btn btn-ghost btn-sm" id="btnSelNone">Bỏ chọn</button>
      <button class="btn btn-danger btn-sm" id="btnClear">🗑</button>
    </div>

    <!-- Album trượt ngang (mobile) -->
    <div id="albumWrap">
      <div id="album">
        <div id="slider"></div>
        <div class="ov" id="selBtn">✓</div>
        <div class="ov badge" id="posBadge">1/1</div>
        <div class="ov badge" id="timeBadge">00:00</div>
        <div class="ov badge" id="zoomHint">Chạm ảnh để phóng to</div>
      </div>
      <div id="thumbs"></div>
    </div>

    <!-- Lưới (desktop) -->
    <div id="grid"></div>
  </div>
</div>

<div id="actionBar">
  <div class="inner">
    <span id="selCount">Đã chọn <b>0</b></span>
    <div style="flex:1;"></div>
    <button class="btn btn-blue" id="btnShare" disabled style="display:none;">📤 Lưu vào Ảnh</button>
    <button class="btn btn-primary" id="btnDownload" disabled>⬇️ Tải ZIP</button>
  </div>
</div>

<div id="lightbox">
  <div id="lbTop">
    <button class="btn btn-ghost btn-sm" id="lbClose">✕ Đóng</button>
    <div style="flex:1;"></div>
    <span class="badge" id="lbPos"></span>
  </div>
  <div id="lbMain"><img id="lbImg" alt=""></div>
  <div id="lbThumbsWrap">
    <div id="lbThumbs"></div>
    <div id="lbCenterMark"></div>
  </div>
  <div id="lbBottom">
    <button class="btn btn-primary" id="lbToggle" style="flex:1;">✓ Chọn</button>
    <button class="btn btn-blue" id="lbSave">📤</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const video = $('video');
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

let frames = [];   // {blob, url, time, sel}
let videoName = 'video';
let cur = 0;       // ảnh hiện tại trong album
let lbCur = 0;

/* ---------- PWA ---------- */
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

/* ---------- Chọn file ---------- */
const dz = $('dropzone'), fi = $('fileInput');
dz.onclick = () => fi.click();
dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag'); };
dz.ondragleave = () => dz.classList.remove('drag');
dz.ondrop = e => { e.preventDefault(); dz.classList.remove('drag'); if (e.dataTransfer.files[0]) loadVideo(e.dataTransfer.files[0]); };
fi.onchange = () => { if (fi.files[0]) loadVideo(fi.files[0]); };
$('btnChangeVideo').onclick = () => fi.click();

function loadVideo(file){
  videoName = file.name.replace(/\.[^.]+$/, '') || 'video';
  video.src = URL.createObjectURL(file);
  video.onloadedmetadata = () => {
    $('videoBox').style.display = 'block';
    $('settings').style.display = 'block';
    dz.style.display = 'none';
    $('videoMeta').textContent = `${file.name} • ${fmtTime(video.duration)} • ${video.videoWidth}×${video.videoHeight}`;
  };
}

/* ---------- Cài đặt ---------- */
$('modeSel').onchange = () => {
  const isCount = $('modeSel').value === 'count';
  $('valLabel').textContent = isCount ? 'Số ảnh' : 'Số giây';
  $('valInput').value = isCount ? 30 : 1;
};

/* ---------- Tách ảnh (song song nhiều luồng) ---------- */
$('btnExtract').onclick = async () => {
  const dur = video.duration;
  if (!dur) return;
  const mode = $('modeSel').value;
  const val = Math.max(0.05, parseFloat($('valInput').value) || 1);
  let times = [];
  if (mode === 'count') {
    const n = Math.min(1000, Math.round(val));
    const step = dur / n;
    for (let i = 0; i < n; i++) times.push(Math.min(i * step + step / 2, dur - 0.05));
  } else {
    for (let t = 0.05; t < dur - 0.1; t += val) times.push(t);
    if (!times.length) times.push(0.05);
  }

  const btn = $('btnExtract');
  btn.disabled = true;
  $('progressWrap').style.display = 'block';
  $('progressFill').style.width = '0%';
  $('progressText').textContent = 'Đang chuẩn bị…';
  video.pause();

  const t0 = performance.now();
  const startIdx = frames.length;
  try {
    const blobs = await extractParallel(times, (done, total) => {
      const pct = Math.round(done / total * 100);
      $('progressFill').style.width = pct + '%';
      $('progressText').textContent = `Đang tách ${done}/${total} ảnh… (${pct}%)`;
    });
    blobs.forEach((blob, i) => {
      if (blob) frames.push({ blob, url: URL.createObjectURL(blob), time: times[i], sel: false });
    });
    const secs = ((performance.now() - t0) / 1000).toFixed(1);
    $('progressText').textContent = `✅ Xong ${times.length} ảnh trong ${secs}s`;
  } catch (e) {
    $('progressText').textContent = '❌ Lỗi: ' + (e.message || e);
  }
  btn.disabled = false;
  cur = startIdx < frames.length ? startIdx : 0;
  render();
  $('framesPanel').scrollIntoView({behavior:'smooth'});
};

function targetDims(){
  let W = video.videoWidth, H = video.videoHeight;
  const maxW = parseInt($('resSel').value) || 0;
  if (maxW && W > maxW) { H = Math.round(H * maxW / W); W = maxW; }
  return [W, H];
}

async function extractParallel(times, onProgress){
  const src = video.src;
  const [W, H] = targetDims();
  const fmt = $('fmtSel').value;
  const results = new Array(times.length);
  let next = 0, done = 0;

  const runWorker = async v => {
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const cx = c.getContext('2d');
    // canvas tí hon để dò frame đen (decoder chưa kịp giải mã)
    const probe = document.createElement('canvas');
    probe.width = 12; probe.height = 12;
    const px = probe.getContext('2d', {willReadFrequently: true});
    const isBlack = () => {
      px.drawImage(v, 0, 0, 12, 12);
      const d = px.getImageData(0, 0, 12, 12).data;
      let s = 0;
      for (let k = 0; k < d.length; k += 4) s += d[k] + d[k+1] + d[k+2];
      return s < (d.length / 4) * 6; // gần như đen tuyệt đối
    };
    while (true) {
      const i = next++;
      if (i >= times.length) break;
      await seekV(v, times[i]);
      if (isBlack()) { // chờ decode xong rồi thử lại 1 lần
        await new Promise(w => setTimeout(w, 120));
        if (isBlack()) await seekV(v, Math.min(times[i] + 0.08, video.duration - 0.05));
      }
      cx.drawImage(v, 0, 0, W, H);
      results[i] = await new Promise(r => c.toBlob(r, fmt, 0.9));
      done++;
      onProgress(done, times.length);
    }
  };

  const t0 = video.currentTime;
  // luồng 1 = chính video đang mở → BẮT ĐẦU NGAY, không chờ gì cả
  const tasks = [runWorker(video)];

  // các luồng phụ: load xong lúc nào thì tự nhảy vào phụ lúc đó
  const extraN = times.length >= 12 ? Math.min(3, (navigator.hardwareConcurrency || 4) - 1) : 0;
  if (workerPool.src !== src) {
    workerPool.extras.forEach(v => { v.removeAttribute('src'); v.load(); });
    workerPool = { src, extras: [] };
  }
  while (workerPool.extras.length < extraN) {
    const v = document.createElement('video');
    v.muted = true;
    v.playsInline = true;
    v.preload = 'auto';
    v.src = src;
    workerPool.extras.push(v);
  }
  workerPool.extras.slice(0, extraN).forEach(v => {
    tasks.push((async () => {
      if (await readyV(v)) await runWorker(v);
    })());
  });

  await Promise.all(tasks);
  video.currentTime = t0; // trả video về chỗ cũ
  return results;
}

let workerPool = { src: null, extras: [] }; // tái sử dụng giữa các lần tách

function readyV(v){
  return new Promise(res => {
    if (v.readyState >= 1) return res(true);
    const to = setTimeout(() => { cleanup(); res(false); }, 8000);
    const ok = () => { cleanup(); res(true); };
    const fail = () => { cleanup(); res(false); };
    const cleanup = () => {
      clearTimeout(to);
      v.removeEventListener('loadedmetadata', ok);
      v.removeEventListener('error', fail);
    };
    v.addEventListener('loadedmetadata', ok);
    v.addEventListener('error', fail);
  });
}

function seekV(v, t){
  return new Promise(r => {
    let settled = false;
    let vfc = 0;
    const done = () => {
      if (settled) return;
      settled = true;
      clearTimeout(to);
      v.removeEventListener('seeked', onSeeked);
      if (vfc && v.cancelVideoFrameCallback) v.cancelVideoFrameCallback(vfc);
      r();
    };
    // vốn đã đứng đúng chỗ → seeked sẽ KHÔNG bắn → xong luôn
    if (Math.abs(v.currentTime - t) < 0.01 && v.readyState >= 2) {
      return r();
    }
    // bảo hiểm: quá 2.5s vẫn đi tiếp, không treo app
    const to = setTimeout(done, 2500);
    // rVFC = frame THẬT SỰ đã decode + hiển thị → hết ảnh đen
    const onSeeked = () => setTimeout(done, v.requestVideoFrameCallback ? 250 : 40);
    if (v.requestVideoFrameCallback) vfc = v.requestVideoFrameCallback(() => done());
    v.addEventListener('seeked', onSeeked);
    v.currentTime = t;
  });
}

function captureFrame(t){
  return new Promise(res => {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(blob => {
      if (blob) frames.push({ blob, url: URL.createObjectURL(blob), time: t, sel: false });
      res();
    }, $('fmtSel').value, 0.92);
  });
}

$('btnCaptureNow').onclick = async () => {
  if (!video.videoWidth) return;
  const [W, H] = targetDims();
  canvas.width = W;
  canvas.height = H;
  await captureFrame(video.currentTime);
  cur = frames.length - 1;
  render();
  toast('📸 Đã chụp ' + fmtTime(video.currentTime));
};

/* ---------- Render ---------- */
function render(){
  $('framesPanel').style.display = frames.length ? 'block' : 'none';
  $('actionBar').style.display = frames.length ? 'block' : 'none';
  $('totalCount').textContent = frames.length;
  $('albumWrap').style.display = isMobile ? 'block' : 'none';
  $('grid').style.display = isMobile ? 'none' : 'grid';
  $('btnShare').style.display = (isMobile && navigator.canShare) ? 'inline-flex' : 'none';
  if (!frames.length) { updateBar(); return; }
  if (cur >= frames.length) cur = frames.length - 1;
  if (isMobile) renderAlbum(); else renderGrid();
  updateBar();
}

/* ----- Album (mobile) ----- */
function renderAlbum(){
  const slider = $('slider');
  slider.innerHTML = '';
  frames.forEach((f, i) => {
    const s = document.createElement('div');
    s.className = 'slide';
    s.innerHTML = `<img src="${f.url}" loading="lazy" alt="">`;
    s.onclick = () => openLightbox(i);
    slider.appendChild(s);
  });
  const thumbs = $('thumbs');
  thumbs.innerHTML = '';
  frames.forEach((f, i) => {
    const t = document.createElement('div');
    t.className = 'thumb' + (f.sel ? ' sel' : '') + (i === cur ? ' cur' : '');
    t.innerHTML = `<img src="${f.url}" loading="lazy" alt="">`;
    t.onclick = () => scrollToSlide(i, true);
    thumbs.appendChild(t);
  });
  requestAnimationFrame(() => scrollToSlide(cur, false));
  updateAlbumUI();
}

let scrollTimer;
$('slider').addEventListener('scroll', () => {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    const s = $('slider');
    const i = Math.round(s.scrollLeft / s.clientWidth);
    if (i !== cur && i >= 0 && i < frames.length) { cur = i; updateAlbumUI(); }
  }, 80);
});

function scrollToSlide(i, smooth){
  cur = i;
  const s = $('slider');
  s.scrollTo({left: i * s.clientWidth, behavior: smooth ? 'smooth' : 'auto'});
  updateAlbumUI();
}

function updateAlbumUI(){
  if (!frames.length) return;
  const f = frames[cur];
  $('posBadge').textContent = `${cur + 1}/${frames.length}`;
  $('timeBadge').textContent = '⏱ ' + fmtTime(f.time);
  $('selBtn').classList.toggle('on', f.sel);
  document.querySelectorAll('#thumbs .thumb').forEach((t, i) => {
    t.classList.toggle('cur', i === cur);
    t.classList.toggle('sel', frames[i].sel);
  });
  const tEl = document.querySelectorAll('#thumbs .thumb')[cur];
  if (tEl) tEl.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  updateBar();
}

$('selBtn').onclick = () => {
  frames[cur].sel = !frames[cur].sel;
  updateAlbumUI();
};

/* ----- Grid (desktop) ----- */
function renderGrid(){
  const grid = $('grid');
  grid.innerHTML = '';
  frames.forEach((f, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (f.sel ? ' sel' : '');
    cell.innerHTML = `<img src="${f.url}" loading="lazy" alt=""><div class="check">✓</div><div class="time">${fmtTime(f.time)}</div>`;
    cell.onclick = e => {
      if (e.target.classList.contains('check')) { f.sel = !f.sel; render(); return; }
      openLightbox(i);
    };
    grid.appendChild(cell);
  });
}

/* ---------- Bar ---------- */
function updateBar(){
  const n = frames.filter(f => f.sel).length;
  $('selCount').innerHTML = `Đã chọn <b>${n}</b>/${frames.length}`;
  $('btnDownload').disabled = n === 0;
  $('btnShare').disabled = n === 0;
}
$('btnSelAll').onclick = () => { frames.forEach(f => f.sel = true); render(); };
$('btnSelNone').onclick = () => { frames.forEach(f => f.sel = false); render(); };
/* Xóa hết: bấm 2 lần để xác nhận (confirm() bị treo trên PWA iOS) */
let clearArm = 0;
$('btnClear').onclick = () => {
  const now = Date.now();
  if (now - clearArm > 3000) {
    clearArm = now;
    $('btnClear').textContent = 'Xóa hết?';
    toast('Bấm lần nữa để xóa toàn bộ ảnh');
    setTimeout(() => { if (Date.now() - clearArm >= 2900) $('btnClear').textContent = '🗑'; }, 3000);
    return;
  }
  clearArm = 0;
  $('btnClear').textContent = '🗑';
  const old = frames;
  frames = []; cur = 0;
  render();
  toast('🗑 Đã xóa hết ảnh');
  // giải phóng bộ nhớ sau khi UI đã cập nhật để không giật
  setTimeout(() => old.forEach(f => URL.revokeObjectURL(f.url)), 600);
};

/* ---------- Lưu vào Ảnh (Web Share API — iPhone/Android) ---------- */
$('btnShare').onclick = async () => {
  const sel = frames.filter(f => f.sel);
  if (!sel.length) return;
  const ext = $('fmtSel').value === 'image/png' ? 'png' : 'jpg';
  const files = sel.map((f, i) =>
    new File([f.blob], `${videoName}_${fmtTime(f.time).replace(/:/g,'-')}.${ext}`, {type: f.blob.type}));
  try {
    if (navigator.canShare && navigator.canShare({files})) {
      await navigator.share({files});
      toast('📤 Chọn "Lưu ảnh" trong menu chia sẻ');
    } else {
      toast('Thiết bị không hỗ trợ — dùng Tải ZIP nhé');
    }
  } catch (e) { /* user cancelled */ }
};

/* ---------- Tải ZIP ---------- */
$('btnDownload').onclick = async () => {
  const sel = frames.filter(f => f.sel);
  if (!sel.length) return;
  const ext = $('fmtSel').value === 'image/png' ? 'png' : 'jpg';
  if (sel.length === 1) { saveBlob(sel[0].blob, frameName(sel[0], ext)); return; }
  const btn = $('btnDownload');
  btn.disabled = true; btn.textContent = '⏳ Đang nén…';
  try {
    const zip = new JSZip();
    sel.forEach(f => zip.file(frameName(f, ext), f.blob));
    const blob = await zip.generateAsync({type:'blob'});
    saveBlob(blob, `${videoName}_frames.zip`);
    toast(`✅ Đã tải ${sel.length} ảnh (ZIP)`);
  } finally { btn.textContent = '⬇️ Tải ZIP'; btn.disabled = false; }
};

function frameName(f, ext){ return `${videoName}_${fmtTime(f.time).replace(/:/g,'-')}.${ext}`; }
function saveBlob(blob, name){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 4000);
}

/* ---------- Lightbox: kéo dải thumbnail để lướt nhanh ---------- */
function openLightbox(i){
  lbCur = i;
  const t = $('lbThumbs');
  t.innerHTML = '';
  frames.forEach((f, j) => {
    const d = document.createElement('div');
    d.className = 'lb-thumb' + (f.sel ? ' sel' : '');
    d.innerHTML = `<img src="${f.url}" loading="lazy" alt="">`;
    d.onclick = () => lbGo(j, true);
    t.appendChild(d);
  });
  $('lightbox').style.display = 'flex';
  requestAnimationFrame(() => { resetZoom(false); lbGo(i, false); updateLbUI(); });
}

/* ---------- Pinch zoom / pan trong preview ---------- */
const lbZ = {s: 1, x: 0, y: 0};
function lbApply(anim){
  const img = $('lbImg');
  img.style.transition = anim ? 'transform .18s ease-out' : 'none';
  img.style.transform = `translate(${lbZ.x}px, ${lbZ.y}px) scale(${lbZ.s})`;
}
function resetZoom(anim){ lbZ.s = 1; lbZ.x = 0; lbZ.y = 0; lbApply(anim); }
function clampZ(){
  const r = $('lbMain').getBoundingClientRect();
  const mx = (lbZ.s - 1) * r.width / 2, my = (lbZ.s - 1) * r.height / 2;
  lbZ.x = Math.max(-mx, Math.min(mx, lbZ.x));
  lbZ.y = Math.max(-my, Math.min(my, lbZ.y));
}
function relC(px, py){
  const r = $('lbMain').getBoundingClientRect();
  return {x: px - r.left - r.width / 2, y: py - r.top - r.height / 2};
}
const midT = (a, b) => ({x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2});

let lbG = null, lbLastTap = 0;
const lbMainEl = $('lbMain');

lbMainEl.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const [a, b] = e.touches;
    lbG = {mode: 'pinch',
           d0: Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY),
           m0: midT(a, b), s0: lbZ.s, x0: lbZ.x, y0: lbZ.y};
    e.preventDefault();
  } else if (e.touches.length === 1) {
    const t = e.touches[0];
    const now = Date.now();
    if (now - lbLastTap < 300) { // double-tap: zoom nhanh 2.5x / thu về
      lbLastTap = 0;
      lbG = null;
      if (lbZ.s > 1) { resetZoom(true); }
      else {
        const m = relC(t.clientX, t.clientY);
        lbZ.s = 2.5;
        lbZ.x = m.x * (1 - 2.5);
        lbZ.y = m.y * (1 - 2.5);
        clampZ(); lbApply(true);
      }
      e.preventDefault();
      return;
    }
    lbLastTap = now;
    if (lbZ.s > 1) {
      lbG = {mode: 'pan', p0: {x: t.clientX, y: t.clientY}, x0: lbZ.x, y0: lbZ.y};
    }
  }
}, {passive: false});

lbMainEl.addEventListener('touchmove', e => {
  if (!lbG) return;
  e.preventDefault();
  if (lbG.mode === 'pinch' && e.touches.length === 2) {
    const [a, b] = e.touches;
    const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    const s = Math.max(1, Math.min(5, lbG.s0 * d / lbG.d0));
    const m0 = relC(lbG.m0.x, lbG.m0.y);
    const mNow = midT(a, b);
    const m1 = relC(mNow.x, mNow.y);
    lbZ.s = s;
    lbZ.x = m1.x - (s / lbG.s0) * (m0.x - lbG.x0);
    lbZ.y = m1.y - (s / lbG.s0) * (m0.y - lbG.y0);
    clampZ(); lbApply(false);
  } else if (lbG.mode === 'pan' && e.touches.length === 1) {
    const t = e.touches[0];
    lbZ.x = lbG.x0 + (t.clientX - lbG.p0.x);
    lbZ.y = lbG.y0 + (t.clientY - lbG.p0.y);
    clampZ(); lbApply(false);
  }
}, {passive: false});

lbMainEl.addEventListener('touchend', e => {
  if (e.touches.length === 0) lbG = null;
  else if (e.touches.length === 1 && lbG && lbG.mode === 'pinch') {
    const t = e.touches[0];
    lbG = lbZ.s > 1
        ? {mode: 'pan', p0: {x: t.clientX, y: t.clientY}, x0: lbZ.x, y0: lbZ.y}
        : null;
  }
});

// desktop: lăn chuột để zoom
lbMainEl.addEventListener('wheel', e => {
  e.preventDefault();
  const m = relC(e.clientX, e.clientY);
  const s0 = lbZ.s;
  const s = Math.max(1, Math.min(5, s0 * (e.deltaY < 0 ? 1.15 : 1 / 1.15)));
  lbZ.x = m.x - (s / s0) * (m.x - lbZ.x);
  lbZ.y = m.y - (s / s0) * (m.y - lbZ.y);
  lbZ.s = s;
  if (s === 1) { lbZ.x = 0; lbZ.y = 0; }
  clampZ(); lbApply(false);
}, {passive: false});

const LB_ITEM = 62; // 56px thumb + 6px gap
function lbGo(i, smooth){
  i = Math.max(0, Math.min(frames.length - 1, i));
  $('lbThumbs').scrollTo({left: i * LB_ITEM, behavior: smooth ? 'smooth' : 'auto'});
}

// ảnh nằm giữa dải thumbnail = ảnh đang preview (cập nhật tức thì theo từng frame kéo)
let lbRaf = false;
$('lbThumbs').addEventListener('scroll', () => {
  if (lbRaf) return;
  lbRaf = true;
  requestAnimationFrame(() => {
    lbRaf = false;
    if (!frames.length) return;
    const i = Math.max(0, Math.min(frames.length - 1,
        Math.round($('lbThumbs').scrollLeft / LB_ITEM)));
    if (i !== lbCur) { lbCur = i; resetZoom(false); updateLbUI(); }
  });
});

let lbPrevCurEl = null;
function updateLbUI(){
  const f = frames[lbCur];
  $('lbImg').src = f.url;
  $('lbPos').textContent = `${lbCur + 1}/${frames.length} • ${fmtTime(f.time)}`;
  $('lbToggle').textContent = f.sel ? '✓ Đã chọn — bấm để bỏ' : '＋ Chọn ảnh này';
  $('lbToggle').className = 'btn btn-sm ' + (f.sel ? 'btn-primary' : 'btn-blue');
  $('lbToggle').style.flex = '1';
  const thumbs = $('lbThumbs').children;
  if (lbPrevCurEl) lbPrevCurEl.classList.remove('cur');
  if (thumbs[lbCur]) {
    thumbs[lbCur].classList.add('cur');
    thumbs[lbCur].classList.toggle('sel', f.sel);
    lbPrevCurEl = thumbs[lbCur];
  }
}
$('lbClose').onclick = () => {
  $('lightbox').style.display = 'none';
  cur = lbCur;
  if (isMobile) { renderAlbum(); } else { render(); }
};
$('lbToggle').onclick = () => { frames[lbCur].sel = !frames[lbCur].sel; updateLbUI(); updateBar(); };
$('lbSave').onclick = async () => {
  const f = frames[lbCur];
  const ext = $('fmtSel').value === 'image/png' ? 'png' : 'jpg';
  const file = new File([f.blob], frameName(f, ext), {type: f.blob.type});
  if (navigator.canShare && navigator.canShare({files:[file]})) {
    try { await navigator.share({files:[file]}); } catch(e){}
  } else { saveBlob(f.blob, frameName(f, ext)); }
};
document.addEventListener('keydown', e => {
  if ($('lightbox').style.display !== 'flex') return;
  if (e.key === 'Escape') $('lbClose').click();
  if (e.key === 'ArrowLeft') lbGo(lbCur - 1, true);
  if (e.key === 'ArrowRight') lbGo(lbCur + 1, true);
});

/* ---------- Utils ---------- */
function fmtTime(s){
  const m = Math.floor(s / 60), sec = (s % 60).toFixed(1).padStart(4, '0');
  return `${String(m).padStart(2,'0')}:${sec}`;
}
let toastTimer;
function toast(msg){
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
